# AuraFlow local Supabase configuration.
# Production credentials and secrets should be set in the Supabase dashboard or CI environment.
project_id = "auraflow"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "8GiB"

[storage.buckets.original-media]
public = false
file_size_limit = "8GiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "video/mp4", "video/quicktime"]

[storage.buckets.processed-media]
public = false
file_size_limit = "8GiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "video/mp4"]

[storage.buckets.frame-thumbnails]
public = false
file_size_limit = "512MiB"
allowed_mime_types = ["image/jpeg", "image/webp"]

[edge_runtime]
enabled = true
policy = "per_worker"
